function countStreak(ayd,checkFn,isBrokenFn,asOfDate){
  const ref=asOfDate?new Date(asOfDate):new Date();ref.setHours(0,0,0,0);
  const touched=getTouchedKeys();
  const refKey=dayKey(ref);const refData=(ayd[ref.getFullYear()]||{})[refKey];

    const day=(ayd[d.getFullYear()]||{})[key];if(!day)break;
    const r=checkFn(day);if(r===null)continue;if(!r)break;past++;
  }

}

function calcMealStreak(ayd,asOfDate){

function rehydrateYearData(raw,yr=CURRENT_YEAR,habitIds=DEFAULT_SELF_HABITS){

      const day={...out[k],...raw[k],date:new Date(raw[k].date)};
      if(day.selfItems){day.selfItems=day.selfItems.filter(s=>s.habitId!=="custom");}
